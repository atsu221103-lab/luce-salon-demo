<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>オンラインストア｜salon &amp; store LUCE</title>
<meta name="description" content="salon & store LUCE のオンラインストア。スタイリストが選んだヘアケア・スタイリング・暮らしの雑貨をお届けします。" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet" />

<style>
/* ブランド設定 (HP側の index.html と色をそろえています) */
:root {
  --color-main:   #7c8a6e;
  --color-accent: #b89b5e;
  --color-bg:     #f7f4ec;
  --color-text:   #3a3a36;
  --font-heading: "Shippori Mincho", serif;
  --font-body:    "Noto Sans JP", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body); color: var(--color-text); background: var(--color-bg); line-height: 1.7; }
a { color: inherit; text-decoration: none; }
.wrap { width: 92%; max-width: 1080px; margin: 0 auto; }

header { background: #fff; border-bottom: 1px solid rgba(0,0,0,.06); position: sticky; top: 0; z-index: 50; }
.bar { display: flex; align-items: center; justify-content: space-between; height: 60px; }
.logo { font-family: var(--font-heading); font-size: 1.2rem; letter-spacing: .1em; }
.bar a.back { font-size: .85rem; color: var(--color-main); }

.lead { text-align: center; padding: 48px 0 24px; }
.lead h1 { font-family: var(--font-heading); font-size: 1.7rem; letter-spacing: .05em; margin-bottom: 8px; }
.lead p { font-size: .9rem; color: #777; }

/* 絞り込みボタン */
.filters { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 24px 0 40px; }
.filters button {
  border: 1px solid var(--color-main); background: transparent; color: var(--color-main);
  padding: 7px 18px; border-radius: 999px; font-size: .85rem; cursor: pointer; transition: .2s; font-family: var(--font-body);
}
.filters button.active, .filters button:hover { background: var(--color-main); color: #fff; }

/* 商品グリッド */
.grid { display: grid; gap: 24px; grid-template-columns: repeat(2,1fr); padding-bottom: 80px; }
@media (min-width: 768px) { .grid { grid-template-columns: repeat(3,1fr); } }
.item { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,.05); display: flex; flex-direction: column; }
.thumb { aspect-ratio: 1 / 1; background: #e9e4d6; position: relative; display: flex; align-items: center; justify-content: center; color: #b3ac98; font-size: .8rem; }
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.badge { position: absolute; top: 10px; left: 10px; background: var(--color-accent); color: #fff; font-size: .7rem; padding: 3px 10px; border-radius: 999px; }
.soldout { position: absolute; inset: 0; background: rgba(58,58,54,.5); color: #fff; display: flex; align-items: center; justify-content: center; font-size: .95rem; letter-spacing: .1em; }
.info { padding: 16px; display: flex; flex-direction: column; flex: 1; }
.cat { font-size: .7rem; color: var(--color-accent); letter-spacing: .05em; }
.name { font-size: .95rem; font-weight: 700; margin: 4px 0 6px; }
.desc { font-size: .8rem; color: #777; flex: 1; }
.note { font-size: .75rem; color: var(--color-main); margin-top: 8px; }
.price { font-family: var(--font-heading); font-size: 1.2rem; margin-top: 12px; }
.price small { font-size: .7rem; color: #999; }
.buy { margin-top: 12px; text-align: center; background: var(--color-main); color: #fff; padding: 10px; border-radius: 8px; font-size: .85rem; font-weight: 700; }
.buy.disabled { background: #ccc; pointer-events: none; }

footer { background: var(--color-text); color: rgba(255,255,255,.75); text-align: center; padding: 30px 0; font-size: .8rem; }
</style>
</head>

<body>

<header>
  <div class="wrap bar">
    <div class="logo">LUCE STORE</div>
    <a href="./index.html" class="back">← トップへ戻る</a>
  </div>
</header>

<div class="wrap">
  <div class="lead">
    <h1>オンラインストア</h1>
    <p>スタイリストが選んだアイテムを、おうちでも。</p>
  </div>

  <!-- 絞り込みボタン (商品データから自動生成) -->
  <div class="filters" id="filters"></div>

  <!-- 商品一覧 (products.js から自動生成) -->
  <div class="grid" id="grid"></div>
</div>

<footer>
  <div class="wrap">&copy; 2026 salon &amp; store LUCE</div>
</footer>

<!-- 商品データを読み込む -->
<script src="./products.js"></script>
<script>
/* ============================================================
   設定: 「購入する」ボタンの飛び先
   - BASE / STORES など本番ストアを作ったら、その商品ページURLを
     products.js の各商品に  buyUrl: "https://..."  として足すと
     その商品ページへ飛びます。
   - まだ無い場合は問い合わせ用URL (LINE等) に飛ばします。
   ============================================================ */
var FALLBACK_BUY_URL = "https://lin.ee/XXXXXXX"; // ★LINE等のURLに差し替え

var products = window.PRODUCTS || [];
var grid = document.getElementById("grid");
var filtersEl = document.getElementById("filters");

// カテゴリ一覧を作る
var cats = ["すべて"].concat(products.map(function(p){ return p.category; })
  .filter(function(v,i,a){ return a.indexOf(v) === i; }));

cats.forEach(function(cat, i){
  var b = document.createElement("button");
  b.textContent = cat;
  if (i === 0) b.classList.add("active");
  b.onclick = function(){
    document.querySelectorAll(".filters button").forEach(function(x){ x.classList.remove("active"); });
    b.classList.add("active");
    render(cat);
  };
  filtersEl.appendChild(b);
});

function yen(n){ return "¥" + Number(n).toLocaleString("ja-JP"); }

function render(filter){
  grid.innerHTML = "";
  products
    .filter(function(p){ return filter === "すべて" || p.category === filter; })
    .forEach(function(p){
      var buyUrl = p.buyUrl || FALLBACK_BUY_URL;
      var thumb = p.image
        ? '<img src="' + p.image + '" alt="' + p.name + '" />'
        : '画像 (準備中)';
      var badge = p.badge ? '<span class="badge">' + p.badge + '</span>' : '';
      var soldout = p.stock ? '' : '<div class="soldout">SOLD OUT</div>';
      var note = p.note ? '<p class="note">' + p.note + '</p>' : '';
      var buyBtn = p.stock
        ? '<a class="buy" href="' + buyUrl + '" target="_blank" rel="noopener">購入する</a>'
        : '<span class="buy disabled">売り切れ</span>';

      grid.insertAdjacentHTML("beforeend",
        '<div class="item">' +
          '<div class="thumb">' + thumb + badge + soldout + '</div>' +
          '<div class="info">' +
            '<span class="cat">' + p.category + '</span>' +
            '<div class="name">' + p.name + '</div>' +
            '<p class="desc">' + p.desc + '</p>' +
            note +
            '<div class="price">' + yen(p.price) + ' <small>(税込)</small></div>' +
            buyBtn +
          '</div>' +
        '</div>'
      );
    });
}

render("すべて");
</script>

</body>
</html>
